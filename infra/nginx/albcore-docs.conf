# Bloco Nginx para servir a documentação (Nextra static export)
# em https://api-core.albuquerquetech.com.br/documentation
#
# Adicione este "location" DENTRO do server block já existente que
# atende api-core.albuquerquetech.com.br (o mesmo que faz proxy_pass
# para a API Spring Boot na porta interna 8080).
#
# Os arquivos estáticos ficam em /var/www/albcore-docs (sincronizados
# pelo pipeline .github/workflows/deploy.yml).

location /documentation/ {
    alias /var/www/albcore-docs/;
    index index.html;

    # Nextra/Next.js export gera arquivos .html sem extensão na URL.
    # Tenta: arquivo exato -> arquivo.html -> pasta/index.html -> 404
    try_files $uri $uri.html $uri/index.html =404;
}

# Redireciona /documentation -> /documentation/ (barra final)
location = /documentation {
    return 301 /documentation/;
}
