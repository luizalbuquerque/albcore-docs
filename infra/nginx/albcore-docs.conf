# Blocos Nginx para servir a documentação (Nextra static export).
#
# Adicione estes "location" DENTRO do server block já existente que
# atende api-core.albuquerquetech.com.br (o mesmo que faz proxy_pass
# para a API Spring Boot na porta interna 8090).
#
# São DOIS sites, com builds e assets ISOLADOS:
#
#   PÚBLICO  -> /var/www/albcore-docs           em /documentation           (aberto)
#              Apenas seções públicas (Início, Introdução, API Reference, Módulos).
#
#   INTERNO  -> /var/www/albcore-docs-internal  em /documentation/internal  (Basic Auth)
#              Site completo (inclui Arquitetura, Deploy & Infra, Contribuindo, Roadmap).
#
# Por que builds separados (e não só senha no path)? No Next.js o conteúdo
# das páginas é embutido nos chunks JS e no índice de busca. Proteger só o
# HTML deixaria o conteúdo interno vazar pelos assets públicos. Como o build
# público NÃO contém nenhuma página interna, não há o que vazar.
#
# Ambos são sincronizados pelo pipeline .github/workflows/deploy.yml.
#
# ----------------------------------------------------------------------------
# Pré-requisito (uma vez) — arquivo de credenciais para a área interna:
#   HASH=$(openssl passwd -apr1 'SUA_SENHA')
#   echo "albcore:$HASH" > /etc/nginx/.htpasswd-albcore
#   chmod 640 /etc/nginx/.htpasswd-albcore && chown root:www-data /etc/nginx/.htpasswd-albcore
# ----------------------------------------------------------------------------

# --- ÁREA INTERNA (Basic Auth) — declarar ANTES do bloco público ---
location = /documentation/internal { return 301 /documentation/internal/; }
location /documentation/internal/ {
    auth_basic "AlbCore - Area Interna";
    auth_basic_user_file /etc/nginx/.htpasswd-albcore;

    alias /var/www/albcore-docs-internal/;
    index index.html;
    try_files $uri $uri.html $uri/index.html =404;
}

# --- ÁREA PÚBLICA (aberta) ---
location = /documentation { return 301 /documentation/; }
location /documentation/ {
    alias /var/www/albcore-docs/;
    index index.html;

    # Nextra/Next.js export gera arquivos .html sem extensão na URL.
    # Tenta: arquivo exato -> arquivo.html -> pasta/index.html -> 404
    try_files $uri $uri.html $uri/index.html =404;
}
