name: Deploy Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

# Caminhos onde o Nginx serve os arquivos estáticos.
#   PUBLIC_PATH   -> location /documentation           (aberto)
#   INTERNAL_PATH -> location /documentation/internal   (Basic Auth)
env:
  PUBLIC_PATH: /var/www/albcore-docs
  INTERNAL_PATH: /var/www/albcore-docs-internal

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (split público + interno)
        run: npm run build:split

      - name: Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
        run: |
          if [ -z "$VPS_HOST" ]; then
            echo "VPS secrets não configurados — pulando deploy"
            exit 0
          fi

          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass rsync

          # Garante que as pastas de destino existem
          sshpass -p "$VPS_PASSWORD" ssh -o StrictHostKeyChecking=no "$VPS_USER@$VPS_HOST" \
            "mkdir -p $PUBLIC_PATH $INTERNAL_PATH"

          # Site PÚBLICO (apenas seções públicas)
          sshpass -p "$VPS_PASSWORD" rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./out-public/ "$VPS_USER@$VPS_HOST:$PUBLIC_PATH/"

          # Site INTERNO (completo, atrás de Basic Auth no Nginx)
          sshpass -p "$VPS_PASSWORD" rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./out-internal/ "$VPS_USER@$VPS_HOST:$INTERNAL_PATH/"

          # Recarrega o Nginx (no-op se a config ainda não existir)
          sshpass -p "$VPS_PASSWORD" ssh -o StrictHostKeyChecking=no "$VPS_USER@$VPS_HOST" \
            "nginx -t && systemctl reload nginx || echo 'Nginx não recarregado — verifique a config /documentation'"

          echo "Deploy concluído: $PUBLIC_PATH (público) + $INTERNAL_PATH (interno)"

      - name: Summary
        if: always()
        run: |
          echo "## Deploy Docs" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Público:** https://api-core.albuquerquetech.com.br/documentation" >> $GITHUB_STEP_SUMMARY
          echo "- **Interno (Basic Auth):** https://api-core.albuquerquetech.com.br/documentation/internal" >> $GITHUB_STEP_SUMMARY
