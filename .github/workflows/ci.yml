name: CI — Build

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build (Next.js static export)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (split público + interno)
        run: npm run build:split

      - name: Verifica isolamento (interno não vaza no build público)
        run: |
          if grep -rq "ADR-002\|folder-structure\|new-module" out-public/ 2>/dev/null; then
            echo "::error::Conteúdo interno vazou no build público (out-public/)"
            exit 1
          fi
          echo "OK: nenhum conteúdo interno encontrado em out-public/"

      - name: Summary
        if: always()
        run: |
          echo "## CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Node:** 20" >> $GITHUB_STEP_SUMMARY
          echo "- **Builds:** out-public/ (/documentation) + out-internal/ (/documentation/internal)" >> $GITHUB_STEP_SUMMARY
